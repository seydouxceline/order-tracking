<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suivi de commande</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #f8f7f4; color: #111; min-height: 100vh; }

.header {
  background: #fff; border-bottom: 1px solid #efefef;
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 999;
}
.brand { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700; }
.live-badge {
  display: flex; align-items: center; gap: 5px;
  background: #f0fdf4; border: 1px solid #bbf7d0;
  border-radius: 20px; padding: 4px 12px;
  font-size: 11px; color: #16a34a; font-weight: 600;
}
.live-dot { width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: pulse 1.5s infinite; }

.container { max-width: 960px; margin: 0 auto; padding: 40px 20px 80px; }
.search-box {
  background: #fff; border-radius: 14px; border: 1px solid #efefef;
  padding: 36px; margin-bottom: 28px; text-align: center;
}
.search-box h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.search-box p { font-size: 14px; color: #888; margin-bottom: 24px; }
.search-row { display: flex; gap: 10px; max-width: 480px; margin: 0 auto; }
.search-row input {
  flex: 1; padding: 12px 16px; border: 1.5px solid #e0e0e0;
  border-radius: 8px; font-size: 14px; font-family: inherit; outline: none;
  transition: border-color 0.2s;
}
.search-row input:focus { border-color: #111; }
.btn {
  padding: 12px 24px; background: #111; color: #fff;
  border: none; border-radius: 8px; font-size: 14px;
  font-family: inherit; cursor: pointer; font-weight: 500; transition: background 0.2s;
}
.btn:hover { background: #333; }

.track-card {
  background: #fff; border-radius: 14px; border: 1px solid #efefef;
  overflow: hidden; animation: fadeUp 0.4s ease;
}
.track-top { padding: 24px 28px; border-bottom: 1px solid #f5f5f5; display: flex; justify-content: space-between; align-items: flex-start; }
.order-ref { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
.order-meta { font-size: 13px; color: #888; margin-top: 4px; }
.badge { padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge.confirmed, .badge.processing { background: #eff6ff; color: #1d4ed8; }
.badge.shipped, .badge.transit { background: #eff6ff; color: #1d4ed8; }
.badge.customs { background: #fffbeb; color: #92400e; }
.badge.delivered { background: #f0fdf4; color: #15803d; }

.status-band {
  padding: 14px 28px; display: flex; align-items: center; gap: 12px;
  border-bottom: 1px solid #f5f5f5; transition: background 0.4s;
}
.status-band.blue { background: #eff6ff; border-bottom-color: #bfdbfe; }
.status-band.yellow { background: #fffbeb; border-bottom-color: #fde68a; }
.status-band.green { background: #f0fdf4; border-bottom-color: #bbf7d0; }
.band-icon { font-size: 20px; flex-shrink: 0; }
.band-text { font-size: 14px; font-weight: 600; }
.band-text.blue { color: #1d4ed8; }
.band-text.yellow { color: #92400e; }
.band-text.green { color: #15803d; }
.band-sub { font-size: 12px; margin-top: 2px; }
.band-sub.blue { color: #3b82f6; }
.band-sub.yellow { color: #d97706; }
.band-sub.green { color: #16a34a; }

.track-body { display: grid; grid-template-columns: 1fr 300px; }
.map-col { border-right: 1px solid #f5f5f5; display: flex; flex-direction: column; }
#map { flex: 1; min-height: 320px; z-index: 1; }

.progress-wrap { padding: 16px 20px; border-top: 1px solid #f5f5f5; }
.progress-bar { height: 3px; background: #f3f4f6; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease, background 0.4s; }

.sidebar { padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }
.sidebar-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: #bbb; margin-bottom: 12px; }

.info-list { display: flex; flex-direction: column; gap: 8px; }
.info-row { display: flex; flex-direction: column; }
.info-row span:first-child { font-size: 11px; color: #aaa; }
.info-row span:last-child { font-size: 13px; font-weight: 500; color: #111; }

.step-row { display: flex; align-items: flex-start; gap: 10px; }
.step-col { display: flex; flex-direction: column; align-items: center; width: 20px; flex-shrink: 0; }
.step-dot {
  width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 600; transition: all 0.3s;
}
.dot-done { background: #f0fdf4; border: 1.5px solid #86efac; color: #16a34a; }
.dot-current { background: #eff6ff; border: 2px solid #3b82f6; color: #3b82f6; }
.dot-pending { background: #f9fafb; border: 1.5px solid #e5e7eb; color: #d1d5db; }
.step-line { width: 2px; flex: 1; min-height: 16px; margin: 3px 0; background: #f3f4f6; }
.step-line.done { background: #d1fae5; }
.step-info { padding-bottom: 14px; padding-top: 1px; }
.step-info:last-child { padding-bottom: 0; }
.step-name { font-size: 12px; font-weight: 500; color: #374151; }
.step-name.done { color: #9ca3af; font-weight: 400; }
.step-name.pending { color: #d1d5db; }
.step-time { font-size: 11px; color: #9ca3af; margin-top: 1px; }
.step-time.current { color: #3b82f6; font-weight: 500; }

.contact-link { font-size: 12px; color: #aaa; text-align: center; line-height: 1.8; border-top: 1px solid #f5f5f5; padding-top: 16px; }
.contact-link a { color: #3b82f6; font-weight: 500; text-decoration: none; }

.msg-box { text-align: center; padding: 60px 20px; color: #888; font-size: 14px; }

@keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

@media (max-width: 680px) {
  .track-body { grid-template-columns: 1fr; }
  .map-col { border-right: none; border-bottom: 1px solid #f5f5f5; }
  #map { min-height: 240px; }
  .track-top { flex-direction: column; gap: 10px; }
}
</style>
</head>
<body>

<div class="header">
  <span class="brand">Suivi de livraison</span>
  <div class="live-badge" id="live-badge" style="display:none;"><div class="live-dot"></div>EN ROUTE</div>
</div>

<div class="container">
  <div class="search-box">
    <h2>Suivre ma commande</h2>
    <p>Entrez votre numéro de suivi reçu par email</p>
    <div class="search-row">
      <input type="text" id="trackInput" placeholder="ex: TRK-2026-00001" />
      <button class="btn" onclick="searchOrder()">Rechercher</button>
    </div>
  </div>
  <div id="result"></div>
</div>

<script>
const SUPABASE_URL = 'https://fzmhrsjebncjuifzarqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6bWhyc2plYm5janVpZnphcnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDY4MTksImV4cCI6MjA5MjUyMjgxOX0.xn1K6keaUkgUrRZTKZRFvjU7eLa8mzqq5yg4T9Ct2hs';

const CHECKPOINT_MAP = {
  confirmed:  { lat: 41.0082, lng: 28.9784, lineIdx: 0 },
  processing: { lat: 41.0082, lng: 28.9784, lineIdx: 0 },
  shipped:    { lat: 51.3397, lng: 12.3731, lineIdx: 3 },
  transit:    { lat: 50.1109, lng: 8.6821,  lineIdx: 4 },
  customs:    { lat: 48.9936, lng: 8.3985,  lineIdx: 5 },
  delivered:  { lat: 46.2276, lng: 2.2137,  lineIdx: 6 },
};

const ROUTE_PATH = [
  [41.0082, 28.9784],
  [42.6977, 23.3219],
  [47.4979, 19.0402],
  [51.3397, 12.3731],
  [50.1109, 8.6821],
  [48.9936, 8.3985],
  [46.2276, 2.2137],
];

const CLIENT_VIEW = {
  confirmed:  { label: 'Expédié',    sub: 'Votre colis a quitté notre entrepôt',                     theme: 'blue',   icon: '📦', stepIdx: 0 },
  processing: { label: 'Expédié',    sub: 'Votre colis est en cours de préparation',                  theme: 'blue',   icon: '📦', stepIdx: 0 },
  shipped:    { label: 'En transit', sub: 'Centre de tri DHL · Leipzig, Allemagne',                    theme: 'blue',   icon: '🚛', stepIdx: 1 },
  transit:    { label: 'En transit', sub: 'Centre de distribution · Frankfurt, Allemagne',             theme: 'blue',   icon: '🚛', stepIdx: 1 },
  customs:    { label: 'En transit', sub: 'Centre de tri Deutsche Post · Karlsruhe, Allemagne',        theme: 'yellow', icon: '🚛', stepIdx: 1 },
  delivered:  { label: 'Livré',      sub: 'Votre commande a été livrée. Merci !',                     theme: 'green',  icon: '✅', stepIdx: 3 },
};

const CLIENT_STEPS = ['Expédié', 'En transit', 'En approche', 'Livré'];

let mapInstance = null;

const params = new URLSearchParams(window.location.search);
const orderParam = params.get('order') || params.get('tracking');
if (orderParam) {
  document.getElementById('trackInput').value = orderParam;
  searchOrder();
}

async function searchOrder() {
  const val = document.getElementById('trackInput').value.trim();
  if (!val) return;
  document.getElementById('result').innerHTML = '<div class="msg-box">Recherche en cours...</div>';
  if (mapInstance) { mapInstance.remove(); mapInstance = null; }
  document.getElementById('live-badge').style.display = 'none';

  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/orders?or=(tracking_id.eq.${val},order_number.eq.${val})&limit=1`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  );
  const data = await res.json();

  if (!data.length) {
    document.getElementById('result').innerHTML = '<div class="msg-box">Aucune commande trouvée avec ce numéro.</div>';
    return;
  }
  renderOrder(data[0]);
}

function renderOrder(order) {
  const status = order.status || 'confirmed';
  const view = CLIENT_VIEW[status] || CLIENT_VIEW.confirmed;
  const cp = CHECKPOINT_MAP[status] || CHECKPOINT_MAP.confirmed;
  const pct = Math.round((cp.lineIdx / (ROUTE_PATH.length - 1)) * 100);
  const lineColor = view.theme === 'yellow' ? '#f59e0b' : view.theme === 'green' ? '#22c55e' : '#3b82f6';

  if (status !== 'delivered') document.getElementById('live-badge').style.display = 'flex';

  const stepsHtml = CLIENT_STEPS.map((s, i) => {
    const done    = i < view.stepIdx;
    const current = i === view.stepIdx;
    const pending = i > view.stepIdx;
    const isLast  = i === CLIENT_STEPS.length - 1;
    return `<div class="step-row">
      <div class="step-col">
        <div class="step-dot ${done ? 'dot-done' : current ? 'dot-current' : 'dot-pending'}">${done ? '✓' : current ? '●' : ''}</div>
        ${!isLast ? `<div class="step-line ${done ? 'done' : ''}"></div>` : ''}
      </div>
      <div class="step-info">
        <div class="step-name ${done ? 'done' : pending ? 'pending' : ''}">${s}</div>
        <div class="step-time ${current ? 'current' : ''}">${done ? 'Complété' : current ? 'En cours' : ''}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('result').innerHTML = `
    <div class="track-card">
      <div class="track-top">
        <div>
          <div class="order-ref">#${order.order_number}</div>
          <div class="order-meta">Suivi : ${order.tracking_id}</div>
        </div>
        <span class="badge ${status}">${view.label}</span>
      </div>
      <div class="status-band ${view.theme}">
        <div class="band-icon">${view.icon}</div>
        <div>
          <div class="band-text ${view.theme}">${view.label}</div>
          <div class="band-sub ${view.theme}">${view.sub}</div>
        </div>
      </div>
      <div class="track-body">
        <div class="map-col">
          <div id="map"></div>
          <div class="progress-wrap">
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${lineColor};"></div>
            </div>
          </div>
        </div>
        <div class="sidebar">
          <div>
            <div class="sidebar-label">Commande</div>
            <div class="info-list">
              <div class="info-row"><span>Client</span><span>${order.customer_name || '-'}</span></div>
              <div class="info-row"><span>Produit</span><span>${order.product_name || '-'}</span></div>
              <div class="info-row"><span>Référence</span><span>#${order.order_number}</span></div>
            </div>
          </div>
          <div>
            <div class="sidebar-label">Étapes</div>
            ${stepsHtml}
          </div>
          <div class="contact-link">
            Une question ?<br>
            <a href="mailto:support@trackyourorder.co">Contacter le support →</a>
          </div>
        </div>
      </div>
    </div>`;

  setTimeout(() => {
    mapInstance = L.map('map', { zoomControl: false, attributionControl: false }).setView([cp.lat, cp.lng], 5);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(mapInstance);
    L.polyline(ROUTE_PATH, { color: '#e5e7eb', weight: 2, dashArray: '5,5', opacity: 0.8 }).addTo(mapInstance);
    if (cp.lineIdx > 0) {
      L.polyline(ROUTE_PATH.slice(0, cp.lineIdx + 1), { color: lineColor, weight: 2.5, opacity: 0.7 }).addTo(mapInstance);
    }
    if (status !== 'delivered') {
      const destIcon = L.divIcon({ html: '<div style="font-size:18px">🏠</div>', className: '', iconSize: [22,22], iconAnchor: [11,18] });
      L.marker(ROUTE_PATH[ROUTE_PATH.length - 1], { icon: destIcon }).addTo(mapInstance);
    }
    const truckIcon = L.divIcon({
      html: `<div style="font-size:20px;filter:drop-shadow(0 2px 5px ${lineColor}88)">${status === 'delivered' ? '✅' : '🚛'}</div>`,
      className: '', iconSize: [26,26], iconAnchor: [13,13]
    });
    L.marker([cp.lat, cp.lng], { icon: truckIcon }).addTo(mapInstance);
  }, 100);
}
</script>
</body>
</html>
