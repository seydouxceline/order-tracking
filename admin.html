<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Suivi commandes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #f8f7f4; color: #111; min-height: 100vh; }
.header { background: #111; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.brand { font-size: 16px; font-weight: 500; color: #fff; }
.container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
.card { background: #fff; border-radius: 12px; border: 1px solid #efefef; padding: 28px; margin-bottom: 20px; }
h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 12px; color: #888; font-weight: 500; }
.form-group input, .form-group select { padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; font-family: inherit; outline: none; }
.form-group input:focus, .form-group select:focus { border-color: #111; }
.btn { padding: 11px 22px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; }
.btn:hover { background: #333; }
.btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 6px; }
.btn-outline { background: transparent; color: #111; border: 1px solid #e0e0e0; }
.btn-outline:hover { background: #f5f5f5; }
.mt { margin-top: 16px; }
table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; font-size: 12px; color: #888; font-weight: 500; padding: 0 12px 12px; border-bottom: 1px solid #efefef; }
tbody td { padding: 14px 12px; font-size: 14px; border-bottom: 1px solid #fafafa; vertical-align: middle; }
.badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; display: inline-block; }
.badge.confirmed { background: #e8f5e9; color: #2e7d32; }
.badge.processing { background: #fff8e1; color: #f57f17; }
.badge.shipped { background: #e3f2fd; color: #1565c0; }
.badge.transit { background: #f3e5f5; color: #6a1b9a; }
.badge.customs { background: #fff3e0; color: #e65100; }
.badge.delivered { background: #e8f5e9; color: #1b5e20; }
.login-wrap { max-width: 400px; margin: 100px auto; }
.msg { font-size: 13px; color: #888; margin-top: 10px; }
.success { color: #2e7d32; }
.error { color: #c62828; }
select.status-select { padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 13px; font-family: inherit; outline: none; cursor: pointer; }
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-wrap">
    <div class="card">
      <h2>Accès admin</h2>
      <div class="form-group" style="margin-bottom:14px;">
        <label>Mot de passe</label>
        <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()" />
      </div>
      <button class="btn" onclick="checkLogin()">Connexion</button>
      <div class="msg error" id="loginErr"></div>
    </div>
  </div>
</div>

<div id="adminPage" style="display:none;">
  <div class="header">
    <span class="brand">Admin — Suivi commandes</span>
    <button class="btn btn-outline" style="color:#fff;border-color:#444;" onclick="logout()">Déconnexion</button>
  </div>
  <div class="container">

    <div class="card">
      <h2>Nouvelle commande</h2>
      <div class="form-grid">
        <div class="form-group">
          <label>Numéro de commande</label>
          <input type="text" id="orderNum" placeholder="ex: 10042" />
        </div>
        <div class="form-group">
          <label>Numéro de suivi (auto)</label>
          <input type="text" id="trackingId" placeholder="TRK-2026-XXXXX" readonly style="background:#f9f9f9;" />
        </div>
        <div class="form-group">
          <label>Nom du client</label>
          <input type="text" id="custName" placeholder="Jean Dupont" />
        </div>
        <div class="form-group">
          <label>Email du client</label>
          <input type="email" id="custEmail" placeholder="jean@email.com" />
        </div>
        <div class="form-group" style="grid-column:1/-1;">
          <label>Produit</label>
          <input type="text" id="prodName" placeholder="Nom du produit" />
        </div>
      </div>
      <button class="btn mt" onclick="createOrder()">Créer la commande</button>
      <div class="msg" id="createMsg"></div>
    </div>

    <div class="card">
      <h2>Commandes en cours</h2>
      <div id="ordersTable"><div style="color:#888;font-size:14px;">Chargement...</div></div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://fzmhrsjebncjuifzarqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6bWhyc2plYm5janVpZnphcnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDY4MTksImV4cCI6MjA5MjUyMjgxOX0.xn1K6keaUkgUrRZTKZRFvjU7eLa8mzqq5yg4T9Ct2hs';
const ADMIN_PASSWORD = 'admin2026';

const STATUSES = ['confirmed','processing','shipped','transit','customs','delivered'];

function checkLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    generateTrackingId();
    loadOrders();
  } else {
    document.getElementById('loginErr').textContent = 'Mot de passe incorrect.';
  }
}

function logout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

window.onload = () => {
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    generateTrackingId();
    loadOrders();
  }
};

function generateTrackingId() {
  const num = String(Math.floor(Math.random() * 99999)).padStart(5, '0');
  document.getElementById('trackingId').value = `TRK-2026-${num}`;
}

async function createOrder() {
  const order_number = document.getElementById('orderNum').value.trim();
  const tracking_id = document.getElementById('trackingId').value.trim();
  const customer_name = document.getElementById('custName').value.trim();
  const customer_email = document.getElementById('custEmail').value.trim();
  const product_name = document.getElementById('prodName').value.trim();
  const msg = document.getElementById('createMsg');

  if (!order_number || !customer_name) {
    msg.className = 'msg error'; msg.textContent = 'Numéro de commande et nom client requis.'; return;
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ order_number, tracking_id, customer_name, customer_email, product_name })
  });

  if (res.ok) {
    msg.className = 'msg success';
    msg.textContent = `✓ Commande créée — Lien tracking: ${window.location.origin}/track.html?order=${tracking_id}`;
    document.getElementById('orderNum').value = '';
    document.getElementById('custName').value = '';
    document.getElementById('custEmail').value = '';
    document.getElementById('prodName').value = '';
    generateTrackingId();
    loadOrders();
  } else {
    msg.className = 'msg error'; msg.textContent = 'Erreur lors de la création.';
  }
}

async function loadOrders() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  const orders = await res.json();

  if (!orders.length) {
    document.getElementById('ordersTable').innerHTML = '<div style="color:#888;font-size:14px;">Aucune commande pour l\'instant.</div>';
    return;
  }

  const rows = orders.map(o => `
    <tr>
      <td><strong>#${o.order_number}</strong></td>
      <td style="color:#888;">${o.tracking_id}</td>
      <td>${o.customer_name}</td>
      <td>${o.product_name || '-'}</td>
      <td><span class="badge ${o.status}">${o.status}</span></td>
      <td>
        <select class="status-select" onchange="updateStatus('${o.id}', this.value)">
          ${STATUSES.map(s => `<option value="${s}" ${s===o.status?'selected':''}>${s}</option>`).join('')}
        </select>
      </td>
      <td><button class="btn btn-outline btn-sm" onclick="copyLink('${o.tracking_id}')">Copier lien</button></td>
    </tr>`).join('');

  document.getElementById('ordersTable').innerHTML = `
    <table>
      <thead><tr>
        <th>Commande</th><th>Tracking ID</th><th>Client</th><th>Produit</th><th>Statut</th><th>Modifier</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateStatus(id, status) {
  await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status, updated_at: new Date().toISOString() })
  });
  loadOrders();
}

function copyLink(tracking_id) {
  const url = `${window.location.origin}/track.html?order=${tracking_id}`;
  navigator.clipboard.writeText(url);
  alert('Lien copié : ' + url);
}
</script>
</body>
</html>
