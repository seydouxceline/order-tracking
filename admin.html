<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Suivi commandes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: #f8f7f4; color: #111; min-height: 100vh; }

.header { background: #111; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.brand { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 700; color: #fff; }

.tabs { background: #1a1a1a; display: flex; gap: 0; padding: 0 24px; }
.tab {
  padding: 12px 20px; font-size: 13px; color: #888; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.15s; font-weight: 500;
}
.tab:hover { color: #ccc; }
.tab.active { color: #fff; border-bottom-color: #fff; }

.container { max-width: 1100px; margin: 40px auto; padding: 0 20px 80px; }
.card { background: #fff; border-radius: 12px; border: 1px solid #efefef; padding: 28px; margin-bottom: 20px; }

h2 { font-size: 15px; font-weight: 600; margin-bottom: 20px; }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group label { font-size: 12px; color: #888; font-weight: 500; }
.form-group input, .form-group select {
  padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 8px;
  font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.2s;
}
.form-group input:focus, .form-group select:focus { border-color: #111; }

.btn { padding: 11px 22px; background: #111; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: inherit; cursor: pointer; font-weight: 500; transition: background 0.2s; }
.btn:hover { background: #333; }
.btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 6px; }
.btn-outline { background: transparent; color: #111; border: 1px solid #e0e0e0; }
.btn-outline:hover { background: #f5f5f5; }
.btn-warn { background: #f59e0b; color: #fff; }
.btn-warn:hover { background: #d97706; }
.mt { margin-top: 16px; }

table { width: 100%; border-collapse: collapse; }
thead th { text-align: left; font-size: 11px; color: #888; font-weight: 500; padding: 0 12px 12px; border-bottom: 1px solid #efefef; text-transform: uppercase; letter-spacing: 0.04em; }
tbody td { padding: 14px 12px; font-size: 13px; border-bottom: 1px solid #fafafa; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #fafafa; }

.badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; display: inline-block; white-space: nowrap; }
.badge.confirmed  { background: #eff6ff; color: #1d4ed8; }
.badge.processing { background: #f0f9ff; color: #0369a1; }
.badge.shipped    { background: #f0fdf4; color: #15803d; }
.badge.transit    { background: #faf5ff; color: #7e22ce; }
.badge.customs    { background: #fffbeb; color: #92400e; }
.badge.approach   { background: #ecfdf5; color: #065f46; }
.badge.delivered  { background: #f0fdf4; color: #14532d; }

/* Mode badges (auto/manuel) */
.mode-badge { padding: 3px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; display: inline-block; margin-left: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
.mode-badge.auto { background: #dbeafe; color: #1e40af; }
.mode-badge.manual { background: #fef3c7; color: #92400e; }

/* Refund badges */
.rbadge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; display: inline-block; }
.rbadge.pending   { background: #fffbeb; color: #92400e; }
.rbadge.processed { background: #f0fdf4; color: #15803d; }
.rbadge.refused   { background: #fef2f2; color: #dc2626; }

.status-select {
  padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 6px;
  font-size: 12px; font-family: inherit; outline: none; cursor: pointer;
  background: #fff; min-width: 160px;
}

.login-wrap { max-width: 400px; margin: 100px auto; }
.msg { font-size: 13px; margin-top: 10px; }
.success { color: #16a34a; }
.error { color: #dc2626; }

.tracking-link {
  font-size: 11px; color: #3b82f6; background: #eff6ff;
  border: 1px solid #bfdbfe; border-radius: 6px;
  padding: 3px 8px; text-decoration: none; white-space: nowrap;
}
.tracking-link:hover { background: #dbeafe; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: #fff; border: 1px solid #efefef; border-radius: 10px; padding: 16px 20px; }
.stat-val { font-size: 24px; font-weight: 600; font-family: 'Playfair Display', serif; }
.stat-label { font-size: 11px; color: #888; margin-top: 3px; }

/* Refund detail modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 1000;
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 16px; padding: 32px;
  max-width: 560px; width: 90%; max-height: 85vh; overflow-y: auto;
  position: relative;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  background: none; border: none; font-size: 20px; cursor: pointer; color: #888;
}
.modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 20px; }
.modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.modal-field { display: flex; flex-direction: column; gap: 3px; }
.modal-field.full { grid-column: 1/-1; }
.modal-field label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; }
.modal-field span { font-size: 13px; color: #111; line-height: 1.5; }
.modal-divider { grid-column: 1/-1; border: none; border-top: 1px solid #f0f0f0; margin: 4px 0; }
.stars-display { color: #f59e0b; font-size: 16px; letter-spacing: 1px; }

@media (max-width: 680px) {
  .form-grid { grid-template-columns: 1fr; }
  .stats { grid-template-columns: 1fr 1fr; }
  .modal-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-wrap">
    <div class="card">
      <h2>Accès admin</h2>
      <div class="form-group" style="margin-bottom:14px;">
        <label>Mot de passe</label>
        <input type="password" id="pwInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')checkLogin()" />
      </div>
      <button class="btn" onclick="checkLogin()">Connexion</button>
      <div class="msg error" id="loginErr"></div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPage" style="display:none;">
  <div class="header">
    <span class="brand">Admin · Suivi commandes</span>
    <button class="btn btn-outline" style="color:#fff;border-color:#444;font-size:13px;" onclick="logout()">Déconnexion</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('orders')">📦 Commandes</div>
    <div class="tab" onclick="switchTab('refunds')">🔄 Remboursements</div>
  </div>

  <div class="container">

    <!-- ===== ONGLET COMMANDES ===== -->
    <div id="tab-orders">
      <div class="stats" id="stats"></div>

      <div class="card">
        <h2>Nouvelle commande</h2>
        <div class="form-grid">
          <div class="form-group">
            <label>Numéro de commande</label>
            <input type="text" id="orderNum" placeholder="ex: 10042" />
          </div>
          <div class="form-group">
            <label>Numéro de suivi (auto)</label>
            <input type="text" id="trackingId" placeholder="TRK-2026-XXXXX" readonly style="background:#f9f9f9;" />
          </div>
          <div class="form-group">
            <label>Nom du client</label>
            <input type="text" id="custName" placeholder="Jean Dupont" />
          </div>
          <div class="form-group">
            <label>Email du client</label>
            <input type="email" id="custEmail" placeholder="jean@email.com" />
          </div>
          <div class="form-group" style="grid-column:1/-1;">
            <label>Produit</label>
            <input type="text" id="prodName" placeholder="Nom du produit" />
          </div>
        </div>
        <button class="btn mt" onclick="createOrder()">Créer la commande</button>
        <div class="msg" id="createMsg"></div>
      </div>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:12px;">
          <h2 style="margin-bottom:0;">Commandes</h2>
          <input type="text" id="searchInput" placeholder="Rechercher..." oninput="filterOrders()" style="padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:220px;">
        </div>
        <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;padding:12px;background:#f9fafb;border-radius:10px;">
          <select id="filterStatus" onchange="filterOrders()" style="padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:white;">
            <option value="">Tous les statuts</option>
            <option value="confirmed">Confirmée</option>
            <option value="processing">En préparation</option>
            <option value="shipped">Expédiée</option>
            <option value="transit">En transit</option>
            <option value="customs">Douane</option>
            <option value="approach">En approche</option>
            <option value="delivered">Livrée</option>
          </select>
          <select id="filterStore" onchange="filterOrders()" style="padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:white;">
            <option value="">Tous les stores</option>
          </select>
          <select id="filterMode" onchange="filterOrders()" style="padding:7px 10px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;background:white;">
            <option value="">Auto + Manuel</option>
            <option value="auto">Auto uniquement</option>
            <option value="manual">Manuel uniquement</option>
          </select>
          <label style="font-size:12px;color:#666;display:flex;align-items:center;gap:6px;">Du
            <input type="date" id="filterDateFrom" onchange="filterOrders()" style="padding:6px 8px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;">
          </label>
          <label style="font-size:12px;color:#666;display:flex;align-items:center;gap:6px;">Au
            <input type="date" id="filterDateTo" onchange="filterOrders()" style="padding:6px 8px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;">
          </label>
          <button class="btn btn-outline btn-sm" onclick="resetFilters()" style="margin-left:auto;">↺ Réinitialiser</button>
        </div>
        <div id="filterCount" style="font-size:12px;color:#888;margin-bottom:10px;"></div>
        <div id="ordersTable"><div style="color:#888;font-size:14px;">Chargement...</div></div>
      </div>
    </div>

    <!-- ===== ONGLET REMBOURSEMENTS ===== -->
    <div id="tab-refunds" style="display:none;">

      <div class="stats" id="refund-stats"></div>

      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h2 style="margin-bottom:0;">Demandes de remboursement</h2>
          <input type="text" id="refundSearch" placeholder="Rechercher..." oninput="filterRefunds()" style="padding:8px 12px;border:1px solid #e0e0e0;border-radius:8px;font-size:13px;font-family:inherit;outline:none;width:220px;">
        </div>
        <div id="refundsTable"><div style="color:#888;font-size:14px;">Chargement...</div></div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL détail remboursement -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕</button>
    <div class="modal-title" id="modal-title">Demande</div>
    <div class="modal-grid" id="modal-content"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fzmhrsjebncjuifzarqh.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6bWhyc2plYm5janVpZnphcnFoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDY4MTksImV4cCI6MjA5MjUyMjgxOX0.xn1K6keaUkgUrRZTKZRFvjU7eLa8mzqq5yg4T9Ct2hs';
const ADMIN_PASSWORD = 'Roadto10M';

const STATUSES = [
  { value: 'confirmed',  label: '✓ Commande confirmée' },
  { value: 'processing', label: '⚙ En préparation' },
  { value: 'shipped',    label: '🚛 En transit — Sofia' },
  { value: 'transit',    label: '🚛 En transit — Leipzig' },
  { value: 'customs',    label: '🛃 Douane' },
  { value: 'approach',   label: '📍 En approche' },
  { value: 'delivered',  label: '✅ Livré' },
];

const REFUND_STATUSES = [
  { value: 'pending',   label: '⏳ En attente' },
  { value: 'processed', label: '✅ Traité' },
  { value: 'refused',   label: '❌ Refusé' },
];

let allOrders = [];
let allRefunds = [];

// === Auto-statut basé sur jours ouvrés ===
function getBusinessDaysElapsed(orderDate) {
  const start = new Date(orderDate);
  const today = new Date();
  let count = 0;
  const cur = new Date(start);
  cur.setHours(0, 0, 0, 0);
  today.setHours(0, 0, 0, 0);
  while (cur < today) {
    cur.setDate(cur.getDate() + 1);
    const day = cur.getDay();
    if (day !== 0 && day !== 6) count++;
  }
  return count;
}

function calculateAutoStatus(orderDate) {
  if (!orderDate) return 'confirmed';
  const days = getBusinessDaysElapsed(orderDate);
  if (days < 3) return 'confirmed';
  if (days < 13) return 'processing';
  if (days < 23) return 'shipped';
  if (days < 33) return 'transit';
  if (days < 48) return 'customs';
  if (days < 60) return 'approach';
  return 'delivered';
}

function getDisplayStatus(order) {
  // Si auto_status === false -> on prend le statut en base
  // Sinon -> on calcule depuis order_date
  if (order.auto_status === false) return order.status || 'confirmed';
  return calculateAutoStatus(order.order_date || order.created_at);
}

function checkLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    generateTrackingId();
    loadOrders();
  } else {
    document.getElementById('loginErr').textContent = 'Mot de passe incorrect.';
  }
}

function logout() {
  sessionStorage.removeItem('admin_auth');
  location.reload();
}

window.onload = () => {
  if (sessionStorage.getItem('admin_auth') === '1') {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    generateTrackingId();
    loadOrders();
  }
};

function switchTab(tab) {
  document.getElementById('tab-orders').style.display  = tab === 'orders'  ? 'block' : 'none';
  document.getElementById('tab-refunds').style.display = tab === 'refunds' ? 'block' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i === 0 && tab === 'orders') || (i === 1 && tab === 'refunds')));
  if (tab === 'refunds') loadRefunds();
}

function generateTrackingId() {
  const num = String(Math.floor(Math.random() * 99999)).padStart(5, '0');
  document.getElementById('trackingId').value = `TRK-2026-${num}`;
}

async function createOrder() {
  const order_number   = document.getElementById('orderNum').value.trim();
  const tracking_id    = document.getElementById('trackingId').value.trim();
  const customer_name  = document.getElementById('custName').value.trim();
  const customer_email = document.getElementById('custEmail').value.trim();
  const product_name   = document.getElementById('prodName').value.trim();
  const msg = document.getElementById('createMsg');

  if (!order_number || !customer_name) {
    msg.className = 'msg error'; msg.textContent = 'Numéro de commande et nom client requis.'; return;
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ order_number, tracking_id, customer_name, customer_email, product_name, status: 'confirmed', auto_status: true, order_date: new Date().toISOString() })
  });

  if (res.ok) {
    msg.className = 'msg success';
    msg.textContent = `✓ Commande créée — lien : ${window.location.origin}/track.html?order=${tracking_id}`;
    document.getElementById('orderNum').value = '';
    document.getElementById('custName').value = '';
    document.getElementById('custEmail').value = '';
    document.getElementById('prodName').value = '';
    generateTrackingId();
    loadOrders();
  } else {
    msg.className = 'msg error'; msg.textContent = 'Erreur lors de la création.';
  }
}

async function loadOrders() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?order=created_at.desc`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  allOrders = await res.json();
  renderStats(allOrders);
  populateStoreFilter();
  filterOrders();
}

function renderStats(orders) {
  const total    = orders.length;
  // Stats basées sur le statut affiché (auto-calculé ou manuel)
  const statuses = orders.map(o => getDisplayStatus(o));
  const transit  = statuses.filter(s => ['shipped','transit','customs'].includes(s)).length;
  const approach = statuses.filter(s => s === 'approach').length;
  const delivered= statuses.filter(s => s === 'delivered').length;
  document.getElementById('stats').innerHTML = [
    { val: total,    label: 'Total commandes' },
    { val: transit,  label: 'En transit' },
    { val: approach, label: 'En approche' },
    { val: delivered,label: 'Livrées' },
  ].map(s => `<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function filterOrders() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fStatus = document.getElementById('filterStatus').value;
  const fStore = document.getElementById('filterStore').value;
  const fMode = document.getElementById('filterMode').value;
  const fFrom = document.getElementById('filterDateFrom').value;
  const fTo = document.getElementById('filterDateTo').value;
  
  const filtered = allOrders.filter(o => {
    // Recherche texte
    if (q && !(
      (o.order_number||'').toLowerCase().includes(q) ||
      (o.customer_name||'').toLowerCase().includes(q) ||
      (o.tracking_id||'').toLowerCase().includes(q) ||
      (o.product_name||'').toLowerCase().includes(q)
    )) return false;
    
    // Filtre statut (utilise le statut affiché, pas le statut DB brut)
    if (fStatus && getDisplayStatus(o) !== fStatus) return false;
    
    // Filtre store
    if (fStore && (o.store_name || '') !== fStore) return false;
    
    // Filtre mode auto/manuel
    if (fMode === 'auto' && o.auto_status === false) return false;
    if (fMode === 'manual' && o.auto_status !== false) return false;
    
    // Filtre période sur order_date (ou created_at en fallback)
    const od = o.order_date || o.created_at;
    if (od) {
      const date = od.substring(0, 10); // YYYY-MM-DD
      if (fFrom && date < fFrom) return false;
      if (fTo && date > fTo) return false;
    } else if (fFrom || fTo) {
      return false;
    }
    
    return true;
  });
  
  document.getElementById('filterCount').textContent = 
    filtered.length === allOrders.length 
      ? `${allOrders.length} commande${allOrders.length > 1 ? 's' : ''}` 
      : `${filtered.length} sur ${allOrders.length} commande${allOrders.length > 1 ? 's' : ''}`;
  
  renderTable(filtered);
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterStore').value = '';
  document.getElementById('filterMode').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  filterOrders();
}

function populateStoreFilter() {
  const stores = [...new Set(allOrders.map(o => o.store_name).filter(Boolean))].sort();
  const sel = document.getElementById('filterStore');
  const current = sel.value;
  sel.innerHTML = '<option value="">Tous les stores</option>' + 
    stores.map(s => `<option value="${s}" ${s===current?'selected':''}>${s}</option>`).join('');
}

function renderTable(orders) {
  if (!orders.length) {
    document.getElementById('ordersTable').innerHTML = '<div style="color:#888;font-size:14px;padding:20px 0;">Aucune commande trouvée.</div>';
    return;
  }
  const rows = orders.map(o => {
    const trackUrl = `${window.location.origin}/track.html?order=${o.tracking_id}`;
    const displayStatus = getDisplayStatus(o);
    const isManual = o.auto_status === false;
    const modeBadge = isManual 
      ? '<span class="mode-badge manual" title="Statut figé manuellement">Manuel</span>' 
      : '<span class="mode-badge auto" title="Calcul automatique selon date">Auto</span>';
    const resetBtn = isManual 
      ? `<button class="btn btn-outline btn-sm" onclick="resetToAuto('${o.id}')" title="Repasser en auto">↺ Auto</button>` 
      : '';
    
    // Date commande + jours écoulés
    const orderDate = o.order_date || o.created_at;
    const dateStr = orderDate ? new Date(orderDate).toLocaleDateString('fr-FR') : '-';
    const daysElapsed = orderDate ? getBusinessDaysElapsed(orderDate) : 0;
    const daysLabel = orderDate ? `<div style="font-size:11px;color:#888;">J+${daysElapsed} ouvré${daysElapsed > 1 ? 's' : ''}</div>` : '';
    
    return `<tr>
      <td><strong>#${o.order_number}</strong></td>
      <td>
        <div>${dateStr}</div>
        ${daysLabel}
      </td>
      <td style="color:#888;font-size:12px;">${o.tracking_id}</td>
      <td>${o.customer_name}</td>
      <td style="color:#666;">${o.product_name || '-'}</td>
      <td style="font-size:12px;color:#666;">${o.store_name || '-'}</td>
      <td>
        <span class="badge ${displayStatus}">${displayStatus}</span>
        ${modeBadge}
      </td>
      <td>
        <select class="status-select" onchange="updateStatus('${o.id}', this.value)">
          ${STATUSES.map(s => `<option value="${s.value}" ${s.value===displayStatus?'selected':''}>${s.label}</option>`).join('')}
        </select>
      </td>
      <td style="display:flex;gap:6px;align-items:center;">
        <a class="tracking-link" href="${trackUrl}" target="_blank">Voir →</a>
        ${resetBtn}
      </td>
      <td><button class="btn btn-outline btn-sm" onclick="copyLink('${o.tracking_id}')">Copier</button></td>
    </tr>`;
  }).join('');
  document.getElementById('ordersTable').innerHTML = `
    <table>
      <thead><tr>
        <th>Commande</th><th>Date</th><th>Tracking ID</th><th>Client</th><th>Produit</th><th>Store</th><th>Statut</th><th>Modifier</th><th>Lien</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateStatus(id, status) {
  // Modification manuelle -> on bascule en mode "manuel" (auto_status = false)
  await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ status, auto_status: false, updated_at: new Date().toISOString() })
  });
  loadOrders();
}

async function resetToAuto(id) {
  if (!confirm('Repasser cette commande en mode automatique ? Le statut sera recalculé selon la date de commande.')) return;
  await fetch(`${SUPABASE_URL}/rest/v1/orders?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ auto_status: true, updated_at: new Date().toISOString() })
  });
  loadOrders();
}

function copyLink(tracking_id) {
  navigator.clipboard.writeText(`${window.location.origin}/track.html?order=${tracking_id}`);
  alert('Lien copié !');
}

// ===== REMBOURSEMENTS =====

async function loadRefunds() {
  const [refundsRes, ordersRes] = await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/refunds?order=created_at.desc`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    }),
    fetch(`${SUPABASE_URL}/rest/v1/orders?select=order_number,order_date,created_at`, {
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    })
  ]);
  
  allRefunds = await refundsRes.json();
  const orders = await ordersRes.json();
  
  // Map order_number -> order_date pour lookup rapide
  const orderDateMap = {};
  orders.forEach(o => {
    if (o.order_number) {
      orderDateMap[String(o.order_number).trim().toLowerCase()] = o.order_date || o.created_at;
    }
  });
  
  // Enrichir chaque refund avec la date de commande
  allRefunds.forEach(r => {
    const orderNum = String(r.order_number || '').trim().toLowerCase().replace(/^#/, '');
    r._order_date = orderDateMap[orderNum] || orderDateMap['#' + orderNum] || null;
  });
  
  renderRefundStats(allRefunds);
  renderRefunds(allRefunds);
}

function renderRefundStats(refunds) {
  const total     = refunds.length;
  const pending   = refunds.filter(r => !r.refund_status || r.refund_status === 'pending').length;
  const processed = refunds.filter(r => r.refund_status === 'processed').length;
  const refused   = refunds.filter(r => r.refund_status === 'refused').length;
  document.getElementById('refund-stats').innerHTML = [
    { val: total,     label: 'Total demandes' },
    { val: pending,   label: 'En attente' },
    { val: processed, label: 'Traitées' },
    { val: refused,   label: 'Refusées' },
  ].map(s => `<div class="stat-card"><div class="stat-val">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');
}

function filterRefunds() {
  const q = document.getElementById('refundSearch').value.toLowerCase();
  const filtered = allRefunds.filter(r =>
    (r.customer_name||'').toLowerCase().includes(q) ||
    (r.customer_email||'').toLowerCase().includes(q) ||
    (r.order_number||'').toLowerCase().includes(q) ||
    (r.motif||'').toLowerCase().includes(q)
  );
  renderRefunds(filtered);
}

function renderRefunds(refunds) {
  if (!refunds.length) {
    document.getElementById('refundsTable').innerHTML = '<div style="color:#888;font-size:14px;padding:20px 0;">Aucune demande pour l\'instant.</div>';
    return;
  }
  const rows = refunds.map(r => {
    const status = r.refund_status || 'pending';
    const date = r.created_at ? new Date(r.created_at).toLocaleDateString('fr-FR') : '-';
    const orderDate = r._order_date ? new Date(r._order_date).toLocaleDateString('fr-FR') : '-';
    return `<tr>
      <td>${date}</td>
      <td><strong>${r.customer_name}</strong><div style="font-size:11px;color:#888;">${r.customer_email}</div></td>
      <td style="color:#666;">${r.order_number || '-'}</td>
      <td style="color:#666;font-size:12px;">${orderDate}</td>
      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.motif || '-'}</td>
      <td>${r.solution || '-'}</td>
      <td><span class="rbadge ${status}">${REFUND_STATUSES.find(s=>s.value===status)?.label || status}</span></td>
      <td>
        <select class="status-select" onchange="updateRefundStatus('${r.id}', this.value)">
          ${REFUND_STATUSES.map(s => `<option value="${s.value}" ${s.value===status?'selected':''}>${s.label}</option>`).join('')}
        </select>
      </td>
      <td><button class="btn btn-outline btn-sm" onclick="openRefund(${JSON.stringify(r).replace(/"/g,'&quot;')})">Détails</button></td>
    </tr>`;
  }).join('');
  document.getElementById('refundsTable').innerHTML = `
    <table>
      <thead><tr>
        <th>Date demande</th><th>Client</th><th>Commande</th><th>Date commande</th><th>Motif</th><th>Solution</th><th>Statut</th><th>Modifier</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

async function updateRefundStatus(id, status) {
  await fetch(`${SUPABASE_URL}/rest/v1/refunds?id=eq.${id}`, {
    method: 'PATCH',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
    body: JSON.stringify({ refund_status: status })
  });
  loadRefunds();
}

function openRefund(r) {
  const stars = r.rating ? '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating) : '-';
  const orderDate = r._order_date ? new Date(r._order_date).toLocaleDateString('fr-FR') : '-';
  document.getElementById('modal-title').textContent = `Demande — ${r.customer_name}`;
  document.getElementById('modal-content').innerHTML = `
    <div class="modal-field"><label>Client</label><span>${r.customer_name}</span></div>
    <div class="modal-field"><label>Email</label><span>${r.customer_email}</span></div>
    <div class="modal-field"><label>Commande</label><span>${r.order_number || '-'}</span></div>
    <div class="modal-field"><label>Date commande</label><span>${orderDate}</span></div>
    <div class="modal-field"><label>Suivi</label><span>${r.tracking_id || '-'}</span></div>
    <div class="modal-field"><label>Produit</label><span>${r.product_name || '-'}</span></div>
    <div class="modal-field"><label>Date problème</label><span>${r.issue_date || '-'}</span></div>
    <hr class="modal-divider">
    <div class="modal-field full"><label>Motif</label><span>${r.motif || '-'}</span></div>
    <div class="modal-field full"><label>Description</label><span>${r.description || '-'}</span></div>
    <div class="modal-field"><label>Solution souhaitée</label><span>${r.solution || '-'}</span></div>
    <div class="modal-field"><label>IBAN</label><span>${r.iban || '-'}</span></div>
    <div class="modal-field"><label>Support contacté</label><span>${r.contacted_support || '-'}</span></div>
    <hr class="modal-divider">
    <div class="modal-field"><label>Note</label><span class="stars-display">${stars}</span></div>
    <div class="modal-field"><label>NPS</label><span>${r.nps ?? '-'} / 10</span></div>
    <div class="modal-field"><label>Livraison ok</label><span>${r.delivery_ok || '-'}</span></div>
    <div class="modal-field"><label>Recommande</label><span>${r.recommend || '-'}</span></div>
    <hr class="modal-divider">
    <div class="modal-field full"><label>Ce qui a déçu</label><span>${r.dislike || '-'}</span></div>
    <div class="modal-field full"><label>Ce qui a plu</label><span>${r.liked || '-'}</span></div>
    <div class="modal-field full"><label>Améliorations</label><span>${r.improve || '-'}</span></div>
    <div class="modal-field"><label>Source</label><span>${r.source || '-'}</span></div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}
</script>
</body>
