// ===== GESTION LANGUE =====
function detectLang() {
  const stored = localStorage.getItem('trackLang');
  if (stored && translations[stored]) return stored;
  const browser = (navigator.language || 'fr').toLowerCase();
  return browser.startsWith('de') ? 'de' : 'fr';
}

let currentLang = detectLang();

function applyLang() {
  const t = translations[currentLang];
  document.documentElement.lang = currentLang;
  document.title = t.pageTitle;
  document.getElementById('page-title').textContent = t.pageTitle;
  document.getElementById('route-badge').textContent = t.routeBadge;
  document.getElementById('search-title').textContent = t.searchTitle;
  document.getElementById('search-subtitle').textContent = t.searchSubtitle;
  document.getElementById('search-btn').textContent = t.searchBtn;
  document.getElementById('tracking-input').placeholder = t.searchPlaceholder;
  
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === currentLang);
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    localStorage.setItem('trackLang', currentLang);
    applyLang();
    // Re-render si une commande est affichée
    const trackingId = new URLSearchParams(window.location.search).get('order');

  });
});

// ===== GÉOCODAGE =====
async function geocodeCity(city, country) {
  if (!city) return null;
  try {
    const query = country ? `${city}, ${country}` : city;
    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
    const data = await res.json();
    if (data && data[0]) {
      return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    }
  } catch(e) { console.error('Geocoding error:', e); }
  return null;
}

// ===== PARCOURS SELON PAYS =====
function getRoute(country, clientCity, clientCoords) {
  const t = translations[currentLang];
  const isGermany = (country || '').toUpperCase().includes('DE') || 
                    (country || '').toLowerCase().includes('german') ||
                    (country || '').toLowerCase().includes('deutsch');
  
  const route = [
    { name: t.cities.istanbul, coords: [41.0082, 28.9784], step: 'transit' },
    { name: t.cities.sofia, coords: [42.6977, 23.3219], step: 'transit' }
  ];
  
  if (isGermany) {
    route.push({ name: t.cities.frankfurt, coords: [50.1109, 8.6821], step: 'customs' });
  } else {
    route.push({ name: t.cities.leipzig, coords: [51.3397, 12.3731], step: 'transit' });
    route.push({ name: t.cities.karlsruhe, coords: [49.0069, 8.4037], step: 'customs' });
  }
  
  // Dernière étape : ville du client
  if (clientCoords) {
    route.push({ name: clientCity || (isGermany ? 'Berlin' : 'Paris'), coords: clientCoords, step: 'delivered' });
  } else {
    // Fallback si géocodage échoue
    route.push({ 
      name: clientCity || (isGermany ? 'Berlin' : 'Paris'), 
      coords: isGermany ? [52.5200, 13.4050] : [48.8566, 2.3522], 
      step: 'delivered' 
    });
  }
  
  return route;
}

// ===== POSITION DU CAMION SELON STATUT =====
function getTruckPosition(status, route) {
  // Mapping status -> index dans route
  const statusToIndex = {
    confirmed: 0,
    processing: 0,
    shipped: 1,
    transit: route.length === 5 ? 2 : 2, // Sofia ou Leipzig selon trajet
    customs: route.length === 5 ? 2 : 3, // Frankfurt si DE, Karlsruhe si FR
    approach: route.length - 2,
    delivered: route.length - 1
  };
  return statusToIndex[status] !== undefined ? statusToIndex[status] : 0;
}

// ===== AFFICHAGE COMMANDE =====
async function loadOrder(trackingId) {
  const t = translations[currentLang];
  const container = document.getElementById('result-container');
  container.innerHTML = `<div class="loading">${t.loading}</div>`;
  
  try {
    const { data, error } = await sb
      .from('orders')
      .select('*')
      .eq('tracking_id', trackingId)
      .single();
    
    if (error || !data) {
      container.innerHTML = `<div class="error-msg">${t.notFound}</div>`;
      return;
    }
    
    await renderOrder(data);
  } catch(e) {
    container.innerHTML = `<div class="error-msg">${t.notFound}</div>`;
  }
}

async function renderOrder(order) {
  const t = translations[currentLang];
  const status = order.status || 'confirmed';
  
  // Géocodage de la ville client
  const clientCoords = await geocodeCity(order.city, order.country);
  const route = getRoute(order.country, order.city, clientCoords);
  const truckIdx = getTruckPosition(status, route);
  
  const banner = t.banners[status] || t.banners.confirmed;
  const statusLabel = t.statuses[status] || t.statuses.confirmed;
  
  // Timeline
  const timelineKeys = ['confirmed', 'processing', 'transit', 'approach', 'delivered'];
  const statusOrder = ['confirmed', 'processing', 'shipped', 'transit', 'customs', 'approach', 'delivered'];
  const currentStatusIdx = statusOrder.indexOf(status);
  
  function getTimelineState(key) {
    const keyMapping = {
      confirmed: ['confirmed'],
      processing: ['processing'],
      transit: ['shipped', 'transit', 'customs'],
      approach: ['approach'],
      delivered: ['delivered']
    };
    const matches = keyMapping[key];
    const minIdx = Math.min(...matches.map(s => statusOrder.indexOf(s)));
    const maxIdx = Math.max(...matches.map(s => statusOrder.indexOf(s)));
    if (currentStatusIdx > maxIdx) return 'completed';
    if (currentStatusIdx >= minIdx && currentStatusIdx <= maxIdx) return 'active';
    return 'pending';
  }
  
  function getTimelineSubtitle(key, state) {
    if (state === 'completed') return t.timelineStatus.completed;
    if (state === 'active') {
      if (key === 'transit' && status === 'customs') return t.timelineStatus.customs;
      return t.timelineStatus.inProgress;
    }
    return t.timelineStatus.pending;
  }
  
  const timelineHTML = timelineKeys.map(key => {
    const state = getTimelineState(key);
    return `
      <li class="timeline-item ${state}">
        <div class="timeline-icon">${state === 'completed' ? '✓' : ''}</div>
        <div class="timeline-content">
          <div class="timeline-title">${t.timelineSteps[key]}</div>
          <div class="timeline-status">${getTimelineSubtitle(key, state)}</div>
        </div>
      </li>
    `;
  }).join('');
  
  // Calcul progress bar
  const progressMap = { confirmed: 15, processing: 30, shipped: 45, transit: 55, customs: 60, approach: 80, delivered: 100 };
  const progressValue = progressMap[status] || 15;
  const progressClass = status === 'delivered' ? 'completed' : (status === 'confirmed' || status === 'processing' ? 'confirmed' : '');
  
  const container = document.getElementById('result-container');
  container.innerHTML = `
    <div class="order-card">
      <div class="order-header">
        <div>
          <div class="order-title">#${order.order_number}</div>
          <div class="order-subtitle">${t.trackingLabel} : ${order.tracking_id}</div>
        </div>
        <span class="order-status ${status}">${statusLabel}</span>
      </div>
      
      <div class="status-banner ${status}">
        <div class="status-banner-icon">${status === 'delivered' ? '📦' : status === 'customs' ? '🛃' : '🚚'}</div>
        <div class="status-banner-content">
          <h3>${banner.title}</h3>
          <p>${banner.text}</p>
        </div>
      </div>
      
      <div class="main-grid">
        <div id="map"></div>
        <div class="sidebar">
          <div class="sidebar-section">
            <div class="sidebar-label">${t.orderLabel}</div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-info">${t.customerLabel}</div>
            <div class="sidebar-value">${order.customer_name || '-'}</div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-info">${t.productLabel}</div>
            <div class="sidebar-value">${order.product_name || '-'}</div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-info">${t.referenceLabel}</div>
            <div class="sidebar-value">#${order.order_number}</div>
          </div>
          <div class="sidebar-section">
            <div class="sidebar-label">${t.stepsLabel}</div>
            <ul class="timeline">${timelineHTML}</ul>
          </div>
          <div class="support-section">
            <div class="support-text">${t.questionLabel}</div>
            <a href="mailto:support@trackyourorder.co" class="support-link">${t.contactSupport}</a>
          </div>
        </div>
      </div>
      
      <div class="progress-bar">
        <div class="progress-fill ${progressClass}" style="width: ${progressValue}%"></div>
      </div>
    </div>
  `;
  
  // Initialiser carte
  initMap(route, truckIdx, status);
}

function initMap(route, truckIdx, status) {
  const map = L.map('map', { 
    zoomControl: false, 
    scrollWheelZoom: false,
    dragging: true,
    attributionControl: false
  });
  
  L.tileLayer('https://cartodb-basemaps-{s}.global.ssl.fastly.net/light_all/{z}/{x}/{y}.png', {
    maxZoom: 18
  }).addTo(map);
  
  // Trace ligne du parcours
  const points = route.map(p => p.coords);
  const completedPoints = points.slice(0, truckIdx + 1);
  const remainingPoints = points.slice(truckIdx);
  
  // Ligne déjà parcourue (verte)
  if (completedPoints.length > 1) {
    L.polyline(completedPoints, { 
      color: '#22c55e', 
      weight: 3,
      opacity: 0.8
    }).addTo(map);
  }
  
  // Ligne restante (orange/pointillés)
  if (remainingPoints.length > 1) {
    L.polyline(remainingPoints, { 
      color: '#f59e0b', 
      weight: 3,
      opacity: 0.6,
      dashArray: '8, 8'
    }).addTo(map);
  }
  
  // Marqueur camion (position actuelle)
  const truckIcon = L.divIcon({
    html: '<div style="font-size: 32px;">🚚</div>',
    iconSize: [40, 40],
    iconAnchor: [20, 20],
    className: 'truck-marker'
  });
  L.marker(route[truckIdx].coords, { icon: truckIcon }).addTo(map);
  
  // Marqueur destination (maison)
  const homeIcon = L.divIcon({
    html: '<div style="font-size: 28px;">🏠</div>',
    iconSize: [36, 36],
    iconAnchor: [18, 18],
    className: 'home-marker'
  });
  L.marker(route[route.length - 1].coords, { icon: homeIcon }).addTo(map);
  
  // Ajuster zoom
  const bounds = L.latLngBounds(points);
  map.fitBounds(bounds, { padding: [40, 40] });
}

// ===== FORMULAIRE =====
document.getElementById('search-form').addEventListener('submit', e => {
  e.preventDefault();
  const trackingId = document.getElementById('tracking-input').value.trim();
  if (trackingId) {
    window.location.href = `?order=${encodeURIComponent(trackingId)}`;
  }
});

// ===== AUTO-LOAD AU CHARGEMENT =====
const urlTracking = new URLSearchParams(window.location.search).get('order');
if (urlTracking) {
  document.getElementById('tracking-input').value = urlTracking;
  loadOrder(urlTracking);
}
</script>
